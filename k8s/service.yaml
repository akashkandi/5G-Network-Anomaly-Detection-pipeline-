apiVersion: v1
kind: Service
metadata:
  name: 5g-anomaly-api-service
  namespace: default
  labels:
    app: 5g-anomaly-detection
    component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  selector:
    app: 5g-anomaly-detection
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP

---
# ── NodePort service for local minikube / kind testing ────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: 5g-anomaly-api-nodeport
  namespace: default
  labels:
    app: 5g-anomaly-detection
    component: api
    access: external
spec:
  type: NodePort
  selector:
    app: 5g-anomaly-detection
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      nodePort: 30080        # Access via <minikube-ip>:30080
      protocol: TCP

---
# ── MLflow UI Service (ClusterIP + port-forward for local access) ─────────────
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: default
  labels:
    app: 5g-anomaly-detection
    component: mlflow
spec:
  type: ClusterIP
  selector:
    app: mlflow
  ports:
    - name: ui
      port: 5000
      targetPort: 5000
      protocol: TCP
