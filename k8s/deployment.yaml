apiVersion: apps/v1
kind: Deployment
metadata:
  name: 5g-anomaly-api
  namespace: default
  labels:
    app: 5g-anomaly-detection
    component: api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 5g-anomaly-detection
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0           # Zero-downtime rolling updates
  template:
    metadata:
      labels:
        app: 5g-anomaly-detection
        component: api
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # ── Security context ───────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # ── Init container: wait for model files ──────────────────────────────
      initContainers:
        - name: wait-for-models
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Checking for model artifacts..."
              until [ -f /app/outputs/models/lstm_model.pt ]; do
                echo "Waiting for lstm_model.pt..."
                sleep 5
              done
              echo "Models found, starting API."
          volumeMounts:
            - name: model-storage
              mountPath: /app/outputs/models
              readOnly: true

      containers:
        - name: api
          image: 5g-anomaly-api:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # ── Environment from ConfigMap ───────────────────────────────────
          envFrom:
            - configMapRef:
                name: 5g-anomaly-config

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: OMP_NUM_THREADS
              value: "2"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # ── Resource limits ──────────────────────────────────────────────
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

          # ── Probes ───────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          # ── Volume mounts ────────────────────────────────────────────────
          volumeMounts:
            - name: model-storage
              mountPath: /app/outputs/models
              readOnly: true
            - name: chromadb-storage
              mountPath: /app/outputs/chromadb
            - name: logs-storage
              mountPath: /app/outputs/logs
            - name: tmp-dir
              mountPath: /tmp

      # ── Volumes ──────────────────────────────────────────────────────────────
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc
        - name: chromadb-storage
          emptyDir: {}
        - name: logs-storage
          emptyDir: {}
        - name: tmp-dir
          emptyDir: {}

      # ── Topology spread for HA ────────────────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: 5g-anomaly-detection

      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
# ── PersistentVolumeClaim for model artefacts ──────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-pvc
  namespace: default
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard   # Use 'standard' for minikube / kind

---
# ── Horizontal Pod Autoscaler ──────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: 5g-anomaly-api-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: 5g-anomaly-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
